<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness 2026 — Vibe Check</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23e87c4f'/%3E%3Ccircle cx='16' cy='16' r='15' fill='none' stroke='%23c45e30' stroke-width='1'/%3E%3Cpath d='M1 16h30M16 1v30' stroke='%23c45e30' stroke-width='1.2' fill='none'/%3E%3Cpath d='M4 7 Q16 16 4 25' stroke='%23c45e30' stroke-width='1.2' fill='none'/%3E%3Cpath d='M28 7 Q16 16 28 25' stroke='%23c45e30' stroke-width='1.2' fill='none'/%3E%3Cpath d='M7 4 Q16 16 25 4' stroke='%23c45e30' stroke-width='1.2' fill='none'/%3E%3Cpath d='M7 28 Q16 16 25 28' stroke='%23c45e30' stroke-width='1.2' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">March Madness 2026 <span>— Vibe Check</span></div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="legend" style="border:none;padding:0;margin:0">
        <div class="legend-item"><div class="vibe-dot" style="background:var(--fire)"></div>On Fire</div>
        <div class="legend-item"><div class="vibe-dot" style="background:var(--dominant)"></div>Dominant</div>
        <div class="legend-item"><div class="vibe-dot" style="background:var(--shaky)"></div>Shaky</div>
        <div class="legend-item"><div class="vibe-dot" style="background:var(--jekyll)"></div>Jekyll</div>
        <div class="legend-item"><div class="vibe-dot" style="background:var(--dark-horse)"></div>Dark Horse</div>
        <div class="legend-item"><div class="vibe-dot" style="background:var(--ice)"></div>Iceberg</div>
      </div>
      <button class="reset-btn" onclick="resetBracket()">↺ Reset</button>
    </div>
  </div>
</div>

<div class="round-nav-wrap">
  <div id="round-nav" class="round-nav"></div>
</div>

<div class="region-subnav-wrap">
  <div id="region-subnav" class="region-subnav"></div>
</div>

<div class="main-wrap">
  <div id="main-content" class="main-content"></div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel(event)">
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-team">
        <div class="panel-seed-name">
          <div class="panel-seed-badge" id="panel-seed">#1</div>
          <div class="panel-name" id="panel-name">Duke</div>
        </div>
        <div class="panel-record" id="panel-record"></div>
      </div>
      <button class="close-btn" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
